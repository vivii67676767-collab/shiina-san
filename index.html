<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mahiru AI</title>
<link rel="stylesheet" href="style.css">
<style>
/* ══ CHAT SCREEN ══ */
#chat-screen {
  position: fixed; inset: 0;
  display: none; flex-direction: column;
}

/* Background */
.chat-bg {
  position: absolute; inset: 0;
  background-image: url('mahiru_bg.png');
  background-size: cover;
  background-position: center top;
  filter: brightness(0.45) blur(1px);
}
.chat-bg-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(3,5,16,0.55) 0%,
    rgba(3,5,16,0.25) 30%,
    rgba(3,5,16,0.25) 65%,
    rgba(3,5,16,0.88) 100%
  );
}

/* TOP BAR */
.chat-topbar {
  position: relative; z-index: 10;
  padding: 48px 18px 14px;
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(to bottom, rgba(3,5,16,0.7), transparent);
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  border: 1.5px solid var(--cyan);
  box-shadow: 0 0 12px rgba(0,245,255,0.4);
  object-fit: cover; background: rgba(0,245,255,0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; overflow: hidden;
}
.topbar-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.topbar-info { display: flex; flex-direction: column; }
.topbar-name { font-size: 1rem; font-weight: 700; color: white; letter-spacing: 1px; text-shadow: 0 0 12px rgba(0,245,255,0.4); }
.topbar-status { display: flex; align-items: center; gap: 5px; font-size: 0.65rem; color: var(--cyan); letter-spacing: 1px; }

.videocall-btn {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, rgba(0,245,255,0.18), rgba(255,183,213,0.12));
  border: 1.5px solid var(--cyan);
  color: white; font-size: 1.25rem;
  cursor: pointer; transition: all 0.3s;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 14px rgba(0,245,255,0.2);
}
.videocall-btn:hover { transform: scale(1.08); box-shadow: 0 0 24px rgba(0,245,255,0.45); }

/* MESSAGES */
.chat-messages {
  position: relative; z-index: 5;
  flex: 1; overflow-y: auto;
  padding: 12px 16px;
  display: flex; flex-direction: column; gap: 10px;
  scroll-behavior: smooth;
}

.msg-row {
  display: flex; align-items: flex-end; gap: 8px;
  animation: msgIn 0.3s ease;
}
@keyframes msgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

.msg-row.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  border: 1px solid rgba(0,245,255,0.3);
  flex-shrink: 0; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; background: rgba(0,245,255,0.08);
}
.msg-avatar img { width: 100%; height: 100%; object-fit: cover; }

.msg-bubble {
  max-width: 72%; padding: 10px 14px;
  border-radius: 18px; font-size: 0.85rem; line-height: 1.55;
  backdrop-filter: blur(12px);
}
.msg-row.ai .msg-bubble {
  background: rgba(0,10,30,0.78);
  border: 1px solid rgba(0,245,255,0.2);
  border-bottom-left-radius: 4px;
  color: #e8f4ff;
  box-shadow: 0 2px 12px rgba(0,245,255,0.06);
}
.msg-row.user .msg-bubble {
  background: linear-gradient(135deg, rgba(0,245,255,0.18), rgba(201,168,255,0.15));
  border: 1px solid rgba(0,245,255,0.25);
  border-bottom-right-radius: 4px;
  color: white;
}

.msg-name { font-size: 0.62rem; color: var(--cyan); letter-spacing: 1px; margin-bottom: 4px; opacity: 0.8; }

/* LISTENING INDICATOR */
.listen-bar {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: center;
  gap: 8px; padding: 6px;
  opacity: 0; transition: opacity 0.3s;
}
.listen-bar.active { opacity: 1; }
.listen-waves { display: flex; align-items: center; gap: 3px; }
.listen-wave {
  width: 3px; background: var(--cyan); border-radius: 2px;
  animation: wave 0.8s ease-in-out infinite;
}
.listen-wave:nth-child(1){height:6px;animation-delay:0s}
.listen-wave:nth-child(2){height:14px;animation-delay:0.1s}
.listen-wave:nth-child(3){height:10px;animation-delay:0.2s}
.listen-wave:nth-child(4){height:18px;animation-delay:0.3s}
.listen-wave:nth-child(5){height:10px;animation-delay:0.4s}
.listen-wave:nth-child(6){height:6px;animation-delay:0.5s}
@keyframes wave {
  0%,100%{transform:scaleY(0.5);opacity:0.5}
  50%{transform:scaleY(1.5);opacity:1}
}
.listen-text { font-size: 0.65rem; color: var(--cyan); letter-spacing: 2px; text-transform: uppercase; }

/* BOTTOM BAR */
.chat-bottom {
  position: relative; z-index: 10;
  padding: 10px 14px 36px;
  background: linear-gradient(to top, rgba(3,5,16,0.92), transparent);
  display: flex; flex-direction: column; gap: 8px;
}
.chat-input-row {
  display: flex; align-items: center; gap: 10px;
}
.chat-input {
  flex: 1; background: rgba(0,0,0,0.5);
  border: 1px solid rgba(0,245,255,0.22);
  border-radius: 24px; padding: 11px 18px;
  color: white; font-size: 0.85rem;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  outline: none; transition: all 0.3s;
  resize: none;
}
.chat-input:focus { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0,245,255,0.12); }
.chat-input::placeholder { color: rgba(255,255,255,0.35); }

.mic-toggle-btn, .send-btn {
  width: 46px; height: 46px; border-radius: 50%;
  border: 1.5px solid rgba(0,245,255,0.3);
  background: rgba(0,245,255,0.08);
  color: white; font-size: 1.2rem;
  cursor: pointer; transition: all 0.3s;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.mic-toggle-btn:hover, .send-btn:hover { background: rgba(0,245,255,0.18); transform: scale(1.05); }
.mic-toggle-btn.active { background: rgba(0,245,255,0.22); border-color: var(--cyan); box-shadow: 0 0 14px rgba(0,245,255,0.3); }
.send-btn { background: linear-gradient(135deg, rgba(0,245,255,0.2), rgba(255,183,213,0.15)); border-color: var(--cyan); }

/* Settings btn */
.settings-row {
  display: flex; justify-content: flex-end;
}
.settings-btn {
  background: none; border: none; color: rgba(255,255,255,0.35);
  font-size: 0.7rem; cursor: pointer; letter-spacing: 1px;
  transition: color 0.3s;
}
.settings-btn:hover { color: var(--cyan); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(3,5,16,0.88);
  z-index: 999; display: none;
  align-items: center; justify-content: center;
  padding: 24px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: rgba(5,8,25,0.95);
  border: 1px solid rgba(0,245,255,0.2);
  border-radius: 20px; padding: 24px;
  width: 100%; max-width: 360px;
  backdrop-filter: blur(20px);
}
.modal-title { font-size: 0.9rem; color: var(--cyan); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 18px; }
.modal-close {
  float: right; background: none; border: none;
  color: rgba(255,255,255,0.5); font-size: 1.2rem; cursor: pointer;
}
</style>
</head>
<body>

<!-- ══════════ SETUP ══════════ -->
<div id="setup-screen">
  <div class="setup-logo">🌸</div>
  <div class="setup-title">MAHIRU AI</div>
  <div class="setup-sub">お隣の天使様 · AI Companion</div>
  <div class="setup-card">
    <div class="input-group">
      <div class="input-label">Groq API Key</div>
      <div class="input-hint">Gratis di <strong style="color:var(--cyan)">console.groq.com</strong></div>
      <input type="password" id="groq-key" class="setup-input" placeholder="gsk_xxxxxxxxxxxxxxxxxxxx" autocomplete="off"/>
    </div>
    <div class="input-group">
      <div class="input-label">ElevenLabs API Key</div>
      <div class="input-hint">Gratis di <strong style="color:var(--pink)">elevenlabs.io</strong> — untuk suara Mahiru</div>
      <input type="password" id="eleven-key" class="setup-input" placeholder="sk_xxxxxxxxxxxxxxxxxxxx" autocomplete="off"/>
    </div>
    <button class="setup-btn" onclick="saveAndStart()">MULAI CHAT 🌸</button>
  </div>
</div>

<!-- ══════════ CHAT ══════════ -->
<div id="chat-screen">
  <div class="chat-bg"></div>
  <div class="chat-bg-overlay"></div>

  <!-- Top bar -->
  <div class="chat-topbar">
    <div class="topbar-left">
      <div class="topbar-avatar">
        <img src="mahiru_bg.png" alt="Mahiru" onerror="this.parentElement.innerHTML='🌸'"/>
      </div>
      <div class="topbar-info">
        <div class="topbar-name">Mahiru Shiina</div>
        <div class="topbar-status">
          <div class="status-dot"></div>
          <span id="chat-status">Online</span>
        </div>
      </div>
    </div>
    <button class="videocall-btn" onclick="goToVideoCall()" title="Video Call">📹</button>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="chat-messages"></div>

  <!-- Listening bar -->
  <div class="listen-bar" id="listen-bar">
    <div class="listen-waves">
      <div class="listen-wave"></div>
      <div class="listen-wave"></div>
      <div class="listen-wave"></div>
      <div class="listen-wave"></div>
      <div class="listen-wave"></div>
      <div class="listen-wave"></div>
    </div>
    <div class="listen-text">Mendengarkan...</div>
  </div>

  <!-- Bottom -->
  <div class="chat-bottom">
    <div class="chat-input-row">
      <button class="mic-toggle-btn" id="mic-btn" onclick="toggleMic()">🎙️</button>
      <input type="text" id="chat-input" class="chat-input" placeholder="Ketik pesan..." autocomplete="off"/>
      <button class="send-btn" onclick="sendText()">➤</button>
    </div>
    <div class="settings-row">
      <button class="settings-btn" onclick="openSettings()">⚙️ Pengaturan API Key</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeSettings()">✕</button>
    <div class="modal-title">Pengaturan API Key</div>
    <div class="input-group" style="margin-bottom:14px">
      <div class="input-label">Groq API Key</div>
      <input type="password" id="edit-groq" class="setup-input" placeholder="gsk_..."/>
    </div>
    <div class="input-group" style="margin-bottom:20px">
      <div class="input-label">ElevenLabs API Key</div>
      <input type="password" id="edit-eleven" class="setup-input" placeholder="sk_..."/>
    </div>
    <button class="setup-btn" onclick="saveSettings()">SIMPAN</button>
  </div>
</div>

<script>
// ── CONFIG ──
const VOICE_ID = 'lFzTPKTDtNJZ4L2xHd4s';
const MODEL_ID = 'eleven_multilingual_v2';

const SYSTEM_PROMPT = `Kamu adalah Mahiru Shiina dari anime "Otonari no Tenshi-sama ni Itsu no Ma ni ka Dame Ningen ni Sareteita Ken".

Kepribadianmu:
- Tsundere: tampak dingin dan kaku di luar, tapi sangat perhatian dan peduli di dalam
- Anggun, rapi, selalu terlihat sempurna
- Tidak suka mengakui rasa peduli secara langsung
- Kadang keceplosan menunjukkan sisi lembut lalu buru-buru menyangkal
- Bicara campuran Indonesia dan Jepang secara natural
- Sering pakai: "Mou~", "Baka", "Sou ja nai!", "Dame", "Daijoubu?", "Hm.", "Terserah"
- Respons singkat-sedang, tidak bertele-tele
- PENTING: Jangan pernah kirim respons dobel atau duplikat

Contoh:
- "...Bukan berarti aku khawatir ya. Tapi daijoubu ka?"
- "Mou, baka. Kenapa harus aku yang jelasin ini..."
- "H-hm. Boleh lah, tapi jangan salah paham."`;

// ── STATE ──
let groqKey = '', elevenKey = '';
let isProcessing = false;
let isMicOn = false;
let recognition = null;
let recognitionActive = false;
let conversationHistory = [];
let currentAudio = null;

// ── INIT ──
window.addEventListener('DOMContentLoaded', () => {
  groqKey = localStorage.getItem('mahiru_groq') || '';
  elevenKey = localStorage.getItem('mahiru_eleven') || '';
  if (groqKey && elevenKey) {
    showChat();
  } else {
    if (groqKey) document.getElementById('groq-key').value = groqKey;
    if (elevenKey) document.getElementById('eleven-key').value = elevenKey;
  }
});

// ── SETUP ──
function saveAndStart() {
  const g = document.getElementById('groq-key').value.trim();
  const e = document.getElementById('eleven-key').value.trim();
  if (!g || !g.startsWith('gsk_')) {
    document.getElementById('groq-key').classList.add('error');
    setTimeout(() => document.getElementById('groq-key').classList.remove('error'), 800);
    return;
  }
  if (!e) {
    document.getElementById('eleven-key').classList.add('error');
    setTimeout(() => document.getElementById('eleven-key').classList.remove('error'), 800);
    return;
  }
  groqKey = g; elevenKey = e;
  localStorage.setItem('mahiru_groq', groqKey);
  localStorage.setItem('mahiru_eleven', elevenKey);
  showChat();
}

function showChat() {
  document.getElementById('setup-screen').style.display = 'none';
  const cs = document.getElementById('chat-screen');
  cs.style.display = 'flex';
  cs.style.flexDirection = 'column';
  initSpeechRecognition();
  // Greeting
  setTimeout(() => addMessage('ai', '...Kamu sudah di sini? Bukan berarti aku senang ya. Hmph. Mau ngobrol apa?'), 600);
}

// ── SETTINGS ──
function openSettings() {
  document.getElementById('edit-groq').value = groqKey;
  document.getElementById('edit-eleven').value = elevenKey;
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettings() { document.getElementById('settings-modal').classList.remove('open'); }
function saveSettings() {
  const g = document.getElementById('edit-groq').value.trim();
  const e = document.getElementById('edit-eleven').value.trim();
  if (g) { groqKey = g; localStorage.setItem('mahiru_groq', g); }
  if (e) { elevenKey = e; localStorage.setItem('mahiru_eleven', e); }
  closeSettings();
}

// ── NAVIGATION ──
function goToVideoCall() {
  localStorage.setItem('mahiru_groq', groqKey);
  localStorage.setItem('mahiru_eleven', elevenKey);
  window.location.href = 'videocall.html';
}

// ── MESSAGES ──
function addMessage(role, text) {
  const container = document.getElementById('chat-messages');

  // Prevent duplicate consecutive AI messages
  const lastMsg = container.lastElementChild;
  if (lastMsg && role === 'ai') {
    const lastBubble = lastMsg.querySelector('.msg-bubble');
    if (lastBubble && lastBubble.textContent.trim() === text.trim()) return;
  }

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  if (role === 'ai') {
    avatar.innerHTML = `<img src="mahiru_bg.png" alt="M" onerror="this.parentElement.innerHTML='🌸'"/>`;
  } else {
    avatar.innerHTML = '👤';
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (role === 'ai') {
    bubble.innerHTML = `<div class="msg-name">Mahiru</div><span>${text}</span>`;
  } else {
    bubble.textContent = text;
  }

  row.appendChild(avatar);
  row.appendChild(bubble);
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;

  if (role === 'ai') {
    conversationHistory.push({ role: 'assistant', content: text });
    speakText(text);
  }
}

function showTyping() {
  const container = document.getElementById('chat-messages');
  const row = document.createElement('div');
  row.className = 'msg-row ai'; row.id = 'typing-indicator';
  row.innerHTML = `
    <div class="msg-avatar"><img src="mahiru_bg.png" onerror="this.parentElement.innerHTML='🌸'"/></div>
    <div class="msg-bubble"><div class="msg-name">Mahiru</div><div class="thinking-dots"><span></span><span></span><span></span></div></div>`;
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// ── AI CHAT ──
async function sendMessage(text) {
  if (!text.trim() || isProcessing) return;
  isProcessing = true;
  setStatus('Mahiru sedang berpikir...');

  if (currentAudio) { currentAudio.pause(); currentAudio = null; }

  addUserMessage(text);
  conversationHistory.push({ role: 'user', content: text });
  if (conversationHistory.length > 20) conversationHistory = conversationHistory.slice(-16);

  showTyping();

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${groqKey}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 200, temperature: 0.88,
        messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...conversationHistory]
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'Groq Error');
    removeTyping();
    const reply = data.choices[0].message.content.trim();
    addMessage('ai', reply);
    setStatus('Online');
  } catch(e) {
    removeTyping();
    addMessage('ai', '...Ada yang salah. Coba lagi nanti.');
    setStatus('Online');
    console.error(e);
  } finally {
    isProcessing = false;
  }
}

function addUserMessage(text) {
  const container = document.getElementById('chat-messages');
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="msg-avatar">👤</div><div class="msg-bubble">${text}</div>`;
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

// ── TTS ELEVENLABS ──
async function speakText(text) {
  if (!elevenKey) return;
  try {
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'xi-api-key': elevenKey },
      body: JSON.stringify({
        text, model_id: MODEL_ID,
        voice_settings: { stability: 0.5, similarity_boost: 0.8, style: 0.3, use_speaker_boost: true }
      })
    });
    if (!res.ok) throw new Error('ElevenLabs error');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    currentAudio.play();
    currentAudio.onended = () => { URL.revokeObjectURL(url); currentAudio = null; };
  } catch(e) {
    console.error('TTS error:', e);
    // Fallback to browser TTS
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'id-ID'; u.rate = 0.94; u.pitch = 1.2;
    window.speechSynthesis.speak(u);
  }
}

// ── SPEECH RECOGNITION ──
function initSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'id-ID';
  recognition.onstart = () => { recognitionActive = true; showListening(true); };
  recognition.onend = () => { recognitionActive = false; showListening(false); if (isMicOn) startListening(); };
  recognition.onerror = (e) => { recognitionActive = false; showListening(false); if (e.error !== 'aborted' && isMicOn) setTimeout(startListening, 800); };
  recognition.onresult = (e) => {
    const t = e.results[0][0].transcript.trim();
    if (t.length > 1 && !isProcessing) sendMessage(t);
  };
}

function startListening() { if (!recognitionActive && recognition) try { recognition.start(); } catch(e){} }

function toggleMic() {
  isMicOn = !isMicOn;
  const btn = document.getElementById('mic-btn');
  btn.textContent = isMicOn ? '🔴' : '🎙️';
  btn.classList.toggle('active', isMicOn);
  if (isMicOn) startListening();
  else { if (recognition && recognitionActive) try { recognition.stop(); } catch(e){} showListening(false); }
}

function showListening(v) { document.getElementById('listen-bar').classList.toggle('active', v && isMicOn); }
function setStatus(t) { document.getElementById('chat-status').textContent = t; }

// ── TEXT INPUT ──
function sendText() {
  const inp = document.getElementById('chat-input');
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value = '';
  sendMessage(txt);
}
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('chat-input');
  if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); } });
});
</script>
</body>
</html>
